<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Items - TalebRent</title>
    <link rel="stylesheet" href="my_items.css">
    <script src="https://kit.fontawesome.com/9f1604d277.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=category" />
</head>
<header>
    <div class="container">
        <div class="h1" onclick="window.location.href='home_page.html'" style="cursor: pointer;">
            <h1>TalebRent</h1>
        </div>
        
        <div class="search">
            <input type="text" id="myItemsSearch" placeholder="SEARCH MY ITEMS">
        </div>
        <div class="buttons">
            <div class="my_items">
                <button onclick="window.location.href='my_items.html'">my items</button>
            </div>
            <div class="listitem">
                <button onclick="window.location.href='list_item.html'"><i class="fa-solid fa-cart-plus" style="color: rgb(3, 3, 3);"></i>
                    listitem</button>
            </div>
            <div class="categories"> 
                <span class="material-symbols-outlined">category</span>
                <select id="category">
                    <option value="">All Categories</option>
                    <option value="Books">Books</option>
                    <option value="Electronics">Electronics</option>
                    <option value="Study Materials">Study Materials</option>
                    <option value="Lab Equipment">Lab Equipment</option>
                    <option value="Drawing & Architecture Tools">Drawing & Architecture Tools</option>
                    <option value="Calculators">Calculators</option>
                    <option value="Furniture">Furniture</option>
                    <option value="Accommodation">Accommodation</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="aboutus">
                <button>about us</button>
            </div>
        </div>
    </div>
</header>
<body>
    
        <main class="my_container">
            <div id="listingsContainer" class="product-grid">
                </div>
        </main>
    
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script type="module" src="my_items.js"></script>
    

  
</body>
</html>

<template id="productCardTemplate">
    <div class="product_card">
        <div class="card_img_wrapper">
            <img class="p-img" src="" alt="">
        </div>
        <div class="card_content">
            <div class="title_row">
                <h2 class="p-title"></h2>
                <h2 class="p-status"></h2>
            </div>
            <p class="p-location"></p>
            <p class="p-availability">
                <i class="fa-solid fa-circle-check"></i> 
                <span class="p-avail-text"></span>
            </p>
            <div class="card_footer">
                <span class="p-price-row">
                    <strong class="p-price"></strong>DA
                    <strong class="p-aday"></strong>
                </span>
            </div>
        </div>
    </div>
</template>

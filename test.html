<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link rel="stylesheet" href="test.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="h1">
                <h1 onclick="window.location.reload()" style="cursor:pointer">TalebRent</h1>
            </div>
    

            <div class="buttons">
                <button onclick="window.location.href='my_items.html'" class="my_items">my items</button>
                <button onclick="window.location.href='list_item.html'"class="list_item"><i class="fa-solid fa-cart-plus"></i> listitem</button>
                <button class="aboutus">about us</button>
            </div>
        </div>
    </header>
    <div class="back_btn">
        <button onclick="window.history.back()" >Back</button>
    </div>
    <div class="contain_det">
        <div class="img_container" id="imageScroll">
            </div>

        <div class="info_section">
            <div class="user_name"><h3 id="username">Loading...</h3></div>
            <div class="product_name">
                <h2 id="productname">Product Name</h2>
                <h3 class="status" id="product_status">STATUS</h3>
            </div>
            <div class="description"><h5 id="description_place">Description...</h5></div>
            <div class="price">
                <h3 class="h3_price"><span id="price_tag">0</span> DA/</h3>
                <h3 id="period">day</h3>
            </div>
            <div class="place">
                <h3 class="h3_wilaya" id="wilaya">WILAYA</h3>
                <h3 id="uni">UNIVERSITY</h3>
            </div>
            <div class="available"><h4 id="available_tag">AVAILABLE FROM...</h4></div>
            <div class="request_btn"><button id="requestBtn">Request</button></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="test.js"></script> 
</body>
</html>
